<!doctype html>
<html lang="en_US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diesel JSON Form</title>
    <link rel="icon" href="/favicon.ico" />
</head>

<body>
    <div id="sandbox">
        <div class="banner">
            <cds-header class="ui-shell--header" aria-label="IBM Platform Name">
                <cds-header-name href="javascript:void 0" prefix="IBM">JSON Editor</cds-header-name>
                <div class="schema-select cds--header__global">
                    <cds-dropdown label="Select Sample Schema" type="inline" id="sampleSchemaSelect"
                        trigger-content="Select an item">
                    </cds-dropdown>
                </div>
                <div id="about"></div>
            </cds-header>
        </div>
        <div class="main">
            <div class="sub schema">
                <div class="sub-head">
                    <h3>Schema</h3>
                </div>
                <div class="editor-wrapper">
                    <textarea id="ta-schema"></textarea>
                </div>
            </div>
            <div class="sub texteditor">
                <div class="sub-head">
                    <h3>JSON</h3>
                </div>
                <div class="editor-wrapper">
                    <textarea spellcheck="false" id="ta-json"></textarea>
                    <cds-button id="btn-to-form" size="xs">
                        <icon-elem slot="icon" icon="arrow-right"></icon-elem>
                    </cds-button>
                </div>
            </div>
            <div class="sub form">
                <div class="sub-head">
                    <h3>FORM</h3>
                </div>
                <json-form id="json-form"></json-form>
            </div>
        </div>
    </div>

    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
